<div class="page">
  <header class="page-header">
    <h1>Gastos Domésticos</h1>
    <app-month-navigator
      [month]="currentMonth()"
      (monthChange)="onMonthChange($event)"
    />
  </header>

  <main class="page-main">
    <section class="card">
      <h2>Novo gasto</h2>
      <app-expense-form
        (expenseSubmit)="onExpenseSubmit($event)"
      />
    </section>

    <dialog #editDialog class="edit-dialog" (close)="onCancelEdit()">
      <h3 class="dialog-edit-title">Editar gasto</h3>
      <app-expense-form
        [editingExpense]="editingExpense()"
        (expenseUpdate)="onUpdateExpense($event)"
        (cancelEdit)="onCancelEdit()"
      />
    </dialog>

    <app-expense-summary
      [expenses]="expenses()"
      [income]="income()"
      (incomeChange)="onSaveIncome($event)"
    />

    <section class="card">
      @if (loading()) {
        <p class="loading">Carregando...</p>
      } @else {
        <app-expense-table
          [expenses]="expenses()"
          (editExpense)="onEditExpense($event)"
          (deleteExpense)="onDeleteExpense($event)"
          (importFixed)="onImportFixed()"
          (consolidateExpenses)="onConsolidate($event)"
        />
      }
    </section>
  </main>
</div>
