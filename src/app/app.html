<div class="page">
  <header class="page-header">
    <h1>Gastos Domésticos</h1>
    <app-month-navigator
      [month]="currentMonth()"
      (monthChange)="onMonthChange($event)"
    />
  </header>

  <main class="page-main">
    <section class="card">
      <h2>Novo gasto</h2>
      <app-expense-form (expenseSubmit)="onExpenseSubmit($event)" />
    </section>

    <app-expense-summary [expenses]="expenses()" />

    <section class="card">
      @if (loading()) {
        <p class="loading">Carregando...</p>
      } @else {
        <app-expense-table
          [expenses]="expenses()"
          (deleteExpense)="onDeleteExpense($event)"
        />
      }
    </section>
  </main>
</div>
