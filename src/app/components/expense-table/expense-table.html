<div class="filter-bar">
  <button
    class="btn-filter btn-filter-variable"
    [class.active]="categoryFilter() === 'VARIABLE'"
    (click)="setFilter('VARIABLE')"
  >Variável</button>
  <button
    class="btn-filter btn-filter-fixed"
    [class.active]="categoryFilter() === 'FIXED'"
    (click)="setFilter('FIXED')"
  >Fixo</button>
  <button
    class="btn-filter"
    [class.active]="categoryFilter() === 'ALL'"
    (click)="setFilter('ALL')"
  >Todos</button>
</div>

@if (filteredExpenses().length === 0) {
  <p class="empty-state">Nenhum gasto registrado neste mês.</p>
} @else {
  <table class="expense-table">
    <thead>
      <tr>
        <th>Descrição</th>
        <th>Data</th>
        <th>Valor</th>
        <th></th>
      </tr>
    </thead>
    <tbody>
      @for (expense of filteredExpenses(); track expense.expenseId) {
        <tr>
          <td>{{ expense.description }}</td>
          <td>{{ formatDate(expense.date) }}</td>
          <td class="amount">{{ formatCents(expense.amount) }}</td>
          <td class="actions">
            <button
              class="btn-edit"
              (click)="onEdit(expense)"
              aria-label="Editar gasto"
            >&#x270E;</button>
            <button
              class="btn-delete"
              (click)="onDelete(expense.expenseId)"
              aria-label="Excluir gasto"
            >&#x2715;</button>
          </td>
        </tr>
      }
    </tbody>
  </table>
}
