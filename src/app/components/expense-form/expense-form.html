<form [formGroup]="form" (ngSubmit)="submit()" class="expense-form">
  <div class="form-group">
    <label for="description">Descrição</label>
    <input
      id="description"
      type="text"
      formControlName="description"
      placeholder="Ex: Supermercado"
    />
    @if (form.controls.description.invalid && form.controls.description.touched) {
      <span class="form-error">Informe uma descrição</span>
    }
  </div>

  <div class="form-group">
    <label for="amount">Valor (R$)</label>
    <input
      id="amount"
      type="number"
      formControlName="amount"
      placeholder="0,00"
      step="0.01"
      min="0.01"
    />
    @if (form.controls.amount.invalid && form.controls.amount.touched) {
      <span class="form-error">Informe um valor válido</span>
    }
  </div>

  <div class="form-group">
    <label for="date">Data</label>
    <input
      id="date"
      type="date"
      formControlName="date"
    />
  </div>

  <div class="form-group">
    <label for="category">Categoria</label>
    <select id="category" formControlName="category">
      <option value="FIXED">Fixo</option>
      <option value="VARIABLE">Variável</option>
    </select>
  </div>

  <button type="submit" [disabled]="form.invalid" class="btn-submit">
    Lançar gasto
  </button>
</form>
