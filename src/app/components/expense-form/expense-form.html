<form [formGroup]="form" (ngSubmit)="submit()" class="expense-form">
  <div class="form-group">
    <label for="description">Descrição</label>
    <input
      id="description"
      type="text"
      formControlName="description"
      placeholder="Ex: Supermercado"
    />
    @if (form.controls.description.invalid && form.controls.description.touched) {
      <span class="form-error">Informe uma descrição</span>
    }
  </div>

  <div class="form-group">
    <label for="amount">Valor (R$)</label>
    <input
      id="amount"
      type="text"
      inputmode="numeric"
      formControlName="amount"
      placeholder="0,00"
      currencyMask
      [options]="{ prefix: '', thousands: '.', decimal: ',', precision: 2, allowNegative: false, nullable: true }"
    />
    @if (form.controls.amount.invalid && form.controls.amount.touched) {
      <span class="form-error">Informe um valor válido</span>
    }
  </div>

  <div class="form-group">
    <label for="date">Data</label>
    <input
      id="date"
      type="date"
      formControlName="date"
    />
  </div>

  <div class="form-group">
    <label for="category">Categoria</label>
    <select id="category" formControlName="category">
      <option value="FIXED">Fixo</option>
      <option value="VARIABLE">Variável</option>
    </select>
  </div>

  <div class="form-actions">
    <button type="submit" [disabled]="form.invalid" class="btn-submit">
      {{ editingExpense() ? 'Salvar alterações' : 'Lançar gasto' }}
    </button>
    @if (editingExpense()) {
      <button type="button" class="btn-cancel" (click)="onCancel()">Cancelar</button>
    }
  </div>
</form>
